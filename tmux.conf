# Terminal quality
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-kitty:Tc"
set -sg escape-time 0

# Emacs-friendly keys
set -g status-keys emacs
setw -g mode-keys emacs

# Pane management
bind | split-window -h
bind - split-window -v

# Clipboard integration for Wayland/X11
if-shell "command -v wl-copy >/dev/null 2>&1" \
  'bind -T copy-mode-vi y send -X copy-pipe-and-cancel "sh -c \"cat | tee >(wl-copy) >(wl-copy --primary) >/dev/null\""' \
  'bind -T copy-mode-vi y send -X copy-pipe-and-cancel "sh -c \"cat | tee >(xclip -selection clipboard -in) >(xclip -selection primary -in) >/dev/null\""'
